paths:
  /api/media:
    get:
      tags:
        - Media
      summary: List media files
      description: Get paginated list of media files with optional filters
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
        - in: query
          name: folderId
          schema:
            type: integer
          description: Filter by folder
        - in: query
          name: tags
          schema:
            type: string
          description: Comma-separated tag IDs
        - in: query
          name: search
          schema:
            type: string
          description: Search in filename
      responses:
        '200':
          description: List of media files
          content:
            application/json:
              schema:
                type: object
                properties:
                  files:
                    type: array
                    items:
                      $ref: '#/components/schemas/Media'
                  pagination:
                    type: object

    post:
      tags:
        - Media
      summary: Upload media file
      description: Upload a new media file
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                folderId:
                  type: integer
      responses:
        '201':
          description: File uploaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Media'
        '400':
          description: Invalid file type or size

  /api/media/{id}:
    put:
      tags:
        - Media
      summary: Update media
      description: Update media metadata (tags, folder)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                folderId:
                  type: integer
                tags:
                  type: array
                  items:
                    type: integer
      responses:
        '200':
          description: Media updated

    delete:
      tags:
        - Media
      summary: Delete media
      description: Delete a media file
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Media deleted

  /api/media/folders:
    get:
      tags:
        - Media
      summary: List folders
      description: Get hierarchical list of media folders
      responses:
        '200':
          description: List of folders

    post:
      tags:
        - Media
      summary: Create folder
      description: Create a new media folder
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                parentId:
                  type: integer
      responses:
        '201':
          description: Folder created

  /api/media/tags:
    get:
      tags:
        - Media
      summary: List media tags
      description: Get list of media tags
      responses:
        '200':
          description: List of tags

    post:
      tags:
        - Media
      summary: Create media tag
      description: Create a new media tag
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
      responses:
        '201':
          description: Tag created

  /api/media/bulk-move:
    put:
      tags:
        - Media
      summary: Bulk move media
      description: Move multiple media files to a folder
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - mediaIds
                - folderId
              properties:
                mediaIds:
                  type: array
                  items:
                    type: integer
                folderId:
                  type: integer
      responses:
        '200':
          description: Files moved
