server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Only keep containers from o-investigador project
      - source_labels: ['__meta_docker_container_name']
        regex: '.*o-investigador.*'
        action: keep
      # Extract container name without leading slash
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.+)'
        target_label: container_name
      # Extract service name from container name (e.g., o-investigador-api-1 -> api)
      - source_labels: ['__meta_docker_container_name']
        regex: '.*o-investigador-([a-zA-Z0-9]+)-.*'
        target_label: service
      # Add compose project label
      - source_labels: ['__meta_docker_container_label_com_docker_compose_project']
        target_label: compose_project
      # Add compose service label
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: compose_service
      # Add image name
      - source_labels: ['__meta_docker_container_image']
        target_label: image
    pipeline_stages:
      # Try to parse JSON logs (common for Node.js applications)
      - json:
          expressions:
            level: level
            message: message
            timestamp: timestamp
          output: json_content
      # If JSON parsing fails, keep the original log line
      - output:
          source: json_content
      # Extract log level for filtering
      - labels:
          level:
      # Add timestamp if present in JSON
      - timestamp:
          source: timestamp
          format: RFC3339Nano
          fallback_formats:
            - RFC3339
            - UnixMs
