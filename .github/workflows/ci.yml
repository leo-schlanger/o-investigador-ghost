name: CI - Tests & Build

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

jobs:
  # -------------------------------------------------
  # Backend Tests (Node.js API)
  # -------------------------------------------------
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: cms-api/package-lock.json

      - name: Install dependencies
        working-directory: ./cms-api
        run: npm ci

      - name: Run tests
        working-directory: ./cms-api
        run: npm test

  # -------------------------------------------------
  # Frontend Tests (React Admin Panel)
  # -------------------------------------------------
  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: admin-panel/package-lock.json

      - name: Install dependencies
        working-directory: ./admin-panel
        run: npm ci

      - name: Run tests
        working-directory: ./admin-panel
        run: npm test -- --run

  # -------------------------------------------------
  # Build Check (ensures production build works)
  # -------------------------------------------------
  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Admin Panel
        working-directory: ./admin-panel
        run: |
          npm ci
          npm run build

      - name: Verify build output
        working-directory: ./admin-panel
        run: |
          if [ ! -d "dist" ]; then
            echo "Build failed - dist folder not found"
            exit 1
          fi
          echo "Build successful!"
          ls -la dist/

  # -------------------------------------------------
  # Docker Build Check
  # -------------------------------------------------
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: ./cms-api
          push: false
          target: production
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Admin image
        uses: docker/build-push-action@v5
        with:
          context: ./admin-panel
          push: false
          target: production
          build-args: |
            VITE_API_URL=https://api.example.com
            VITE_GHOST_URL=https://example.com
            VITE_ENV=production
          cache-from: type=gha
          cache-to: type=gha,mode=max
