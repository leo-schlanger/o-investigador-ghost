apiVersion: 1

groups:
  - orgId: 1
    name: O Investigador Alerts
    folder: alerts
    interval: 5m
    rules:
      - uid: error-rate-high
        title: High Error Rate
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: loki
            model:
              expr: 'sum(count_over_time({compose_service=~".+"} |~ "(?i)(error|exception|fatal)" [5m]))'
              queryType: range
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 10
        noDataState: OK
        execErrState: Alerting
        for: 5m
        annotations:
          summary: "High error rate detected - more than 10 errors in 5 minutes"
        labels:
          severity: critical

      - uid: service-down
        title: Service Not Logging
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: loki
            model:
              expr: 'sum(count_over_time({compose_service="api"} [10m]))'
              queryType: range
          - refId: C
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: lt
                    params:
                      - 1
        noDataState: Alerting
        execErrState: Alerting
        for: 10m
        annotations:
          summary: "API service has produced no logs for 10 minutes - may be down"
        labels:
          severity: warning

contactPoints:
  - orgId: 1
    name: default-email
    receivers:
      - uid: email-receiver
        type: email
        settings:
          addresses: "${CONTACT_EMAIL}"
        disableResolveMessage: false

policies:
  - orgId: 1
    receiver: default-email
    group_by:
      - alertname
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
