# Production Configuration for ISSCLOUD VPS (Classic S Plan)
services:
  # MySQL Database
  mysql:
    image: mysql:8
    restart: always
    mem_limit: 1g
    memswap_limit: 1g
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./infrastructure/mysql/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - o-investigador-network

  # Ghost CMS
  ghost:
    image: ghost:5-alpine
    mem_limit: 512m
    memswap_limit: 512m
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      url: https://jornalinvestigador.pt
      NODE_ENV: production
      database__client: mysql2
      database__connection__host: mysql
      database__connection__port: 3306
      database__connection__user: ${DB_USER}
      database__connection__password: ${DB_PASSWORD}
      database__connection__database: ${DB_NAME}
      mail__transport: SMTP
      mail__options__service: SendGrid
      mail__options__auth__user: apikey
      mail__options__auth__pass: ${SENDGRID_API_KEY}
      mail__from: noreply@jornalinvestigador.pt
      privacy__useTinfoil: "false"
    volumes:
      - ghost_content:/var/lib/ghost/content
      - ./ghost-theme:/var/lib/ghost/content/themes/o-investigador
    healthcheck:
      test: [ "CMD-SHELL", "node -e \"require('http').get('http://localhost:2368/', (r) => process.exit(r.statusCode < 400 ? 0 : 1)).on('error', () => process.exit(1))\"" ]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - o-investigador-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    restart: always
    mem_limit: 256m
    memswap_limit: 256m
    command: >
      sh -c "if [ -n \"$$REDIS_PASSWORD\" ]; then
        redis-server --requirepass $$REDIS_PASSWORD;
      else
        redis-server;
      fi"
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "if [ -n \"$REDIS_PASSWORD\" ]; then redis-cli -a $REDIS_PASSWORD ping; else redis-cli ping; fi"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - o-investigador-network

  # Custom API (Node.js)
  api:
    mem_limit: 512m
    memswap_limit: 512m
    build:
      context: ./cms-api
      dockerfile: Dockerfile
      target: production
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
      ghost:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      GHOST_API_URL: ${GHOST_API_URL}
      GHOST_API_KEY: ${GHOST_API_KEY}
      JWT_SECRET: ${JWT_SECRET}
      API_PORT: 3000
      AWS_REGION: eu-west-1
      AWS_BUCKET: ${AWS_BUCKET}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      CORS_ORIGIN: https://jornalinvestigador.pt,https://admin.jornalinvestigador.pt
      PUBLIC_API_URL: https://api.jornalinvestigador.pt
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      RATE_LIMIT_WINDOW: 15m
      RATE_LIMIT_MAX_REQUESTS: 100
    volumes:
      - api_uploads:/app/uploads
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - o-investigador-network

  # Admin Panel (React - static build served by nginx)
  admin:
    build:
      context: ./admin-panel
      dockerfile: Dockerfile
      target: production
      args:
        VITE_API_URL: https://api.jornalinvestigador.pt
        VITE_GHOST_URL: https://jornalinvestigador.pt
        VITE_ENV: production
    restart: always
    depends_on:
      - api
    networks:
      - o-investigador-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    restart: always
    mem_limit: 128m
    memswap_limit: 128m
    depends_on:
      - ghost
      - api
      - admin
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/nginx/nginx-prod.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt/:/etc/letsencrypt/:ro
    networks:
      - o-investigador-network

  # ========================================
  # MONITORING STACK (Grafana + Loki + Promtail)
  # ========================================

  # Loki - Log aggregation system
  loki:
    image: grafana/loki:3.1.0
    restart: always
    mem_limit: 256m
    memswap_limit: 256m
    volumes:
      - ./infrastructure/monitoring/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - o-investigador-network

  # Promtail - Log collector (reads Docker container logs)
  promtail:
    image: grafana/promtail:3.1.0
    restart: always
    mem_limit: 128m
    memswap_limit: 128m
    depends_on:
      loki:
        condition: service_healthy
    volumes:
      - ./infrastructure/monitoring/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - o-investigador-network

  # Grafana - Visualization and dashboards
  grafana:
    image: grafana/grafana:10.2.0
    restart: always
    mem_limit: 256m
    memswap_limit: 256m
    depends_on:
      loki:
        condition: service_healthy
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: https://admin.jornalinvestigador.pt/grafana/
      GF_SERVER_DOMAIN: admin.jornalinvestigador.pt
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infrastructure/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3002:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - o-investigador-network

volumes:
  mysql_data:
  ghost_content:
  api_uploads:
  redis_data:
  loki_data:
  grafana_data:

networks:
  o-investigador-network:
    driver: bridge
